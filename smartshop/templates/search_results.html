{% extends 'master.html' %}

{% block content %}

<h2>Search Results for "{{ query }}"</h2>

<div class="row">

{% for product in products %}
<div class="col-md-3">
    <div class="card">
        <img src="{{ product.image }}" class="card-img-top">
        <div class="card-body">
            <h5>{{ product.name }}</h5>
            <p>₹{{ product.price }}</p>
        </div>
    </div>
</div>
{% empty %}
<p>No products found</p>
{% endfor %}

</div>

{% endblock %}
