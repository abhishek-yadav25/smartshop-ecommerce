{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>SmartShop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background:#f3f3f3;">

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">

<a class="navbar-brand fw-bold" href="/">SmartShop</a>

<form class="d-flex mx-auto" style="width:50%;" method="GET" action="{% url 'search' %}">
    <input class="form-control" type="search" name="q" placeholder="Search products">
    <button class="btn btn-warning ms-2">Search</button>
</form>

<ul class="navbar-nav align-items-center">

{% if user.is_authenticated %}

<li class="nav-item me-3">
<span class="text-white">Hello, {{ user.username }}</span>
</li>

<li class="nav-item me-3">
<a class="nav-link text-white" href="{% url 'logout' %}">Logout</a>
</li>

{% else %}

<li class="nav-item me-3">
<a class="nav-link text-white" href="{% url 'login' %}">Login</a>
</li>

<li class="nav-item me-3">
<a class="nav-link text-white" href="{% url 'register' %}">Register</a>
</li>

{% endif %}

<li class="nav-item">
<a class="nav-link text-white" href="{% url 'cart' %}">
<i class="bi bi-cart3"></i> Cart
</a>
</li>

</ul>

</div>
</nav>

<div class="container mt-4">

    {% if messages %}
<script>
{% for message in messages %}
alert("{{ message }}");
{% endfor %}
</script>
{% endif %}




{% block content %}
{% endblock %}

</div>

<script src="{% static 'js/style.js' %}"></script>


</body>
</html>
