{% extends 'master.html' %}

{% block content %}

<h3>Your Cart</h3>

<table class="table">

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>

{% for item in cart_items %}

<tr>

<td>{{ item.name }}</td>

<td>₹ {{ item.price }}</td>

<td>

<a href="{% url 'decrease' item.id %}" class="btn btn-sm btn-danger">-</a>

{{ item.quantity }}

<a href="{% url 'increase' item.id %}" class="btn btn-sm btn-success">+</a>

</td>

<td>₹ {{ item.total }}</td>

<td>
<div class="d-flex gap-2">

<a href="{% url 'remove_from_cart' item.id %}"
class="btn btn-outline-danger btn-sm">
🗑 Remove
</a>

<a href="{% url 'checkout' %}"
class="btn btn-success btn-sm">
🛒 Checkout
</a>

</div>
</td>

</tr>

{% endfor %}

</table>

<h4>Total: ₹ {{ total }}</h4>

{% endblock %}
