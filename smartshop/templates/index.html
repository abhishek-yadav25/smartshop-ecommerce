{% extends 'master.html' %}

{% block content %}

<h3 class="mb-4">Products</h3>

<div class="row">

{% for product in products %}

<div class="col-md-3 mb-4">

<div class="card h-100 shadow-sm">

<img src="{{ product.image }}" class="card-img-top" style="height:200px; object-fit:cover;">

<div class="card-body d-flex flex-column">

<h6 class="card-title">{{ product.name }}</h6>

<p class="text-success fw-bold">₹ {{ product.price }}</p>

<div class="mt-auto">

<a href="{% url 'product_detail' product.id %}" class="btn btn-outline-primary btn-sm">
View
</a>

<a href="{% url 'add_to_cart' product.id %}" class="btn btn-warning btn-sm">
Add to Cart
</a>

</div>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
